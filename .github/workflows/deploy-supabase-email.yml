name: Configure Supabase approver email

# Default: Supabase built-in mail (any approver address, no domain, no Resend).
# Optional: SENDGRID_API_KEY + EMAIL_FROM for branded mail via verified Gmail.
# Optional: RESEND_API_KEY + EMAIL_FROM on a verified domain.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
      - 'scripts/configure-supabase-email.mjs'
      - '.github/workflows/deploy-supabase-email.yml'

jobs:
  configure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Configure approver email (Supabase default or optional SendGrid/Resend)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_FROM: ${{ vars.EMAIL_FROM }}
          ENABLE_BRANDED_AUTH_HOOK: ${{ vars.ENABLE_BRANDED_AUTH_HOOK }}
        run: node scripts/configure-supabase-email.mjs
