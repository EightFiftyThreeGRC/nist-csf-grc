name: Migrate program_kind column

# One-shot: adds programs.program_kind for CSF vs 800-53 isolation.
# Requires repo secret SUPABASE_ACCESS_TOKEN (same as provision-supabase workflow).

on:
  push:
    branches: ["run-migrate-program-kind"]
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Apply migration
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: mdysqwcbgfizzojqojwu
        run: node scripts/migrate-program-kind.mjs
